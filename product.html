<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="images/twice_logo1.png">
    <title>Product - TW!CE</title>
    
</head>
<body>

    <script>

        // get ID from URL
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");
        const product = products[id];

        // safety check
        if (!product) {
            document.body.innerHTML = "<h2>Product not found</h2>";
        }

        // Load data 
        document.getElementById("name").innerText = product.name;
        document.getElementById("price").innerText = product.price;
        document.getElementById("seller").innerText = "Sold by " + product.seller;
        document.getElementById("description").innerText = product.description;
        document.getElementById("main-img").src = product.images[0];

        // Gallery 
        const gallery = document.getElementById("gallery");
        product.images.forEach(img => {
            const image = document.createElement("img");
            image.src = img;
            image.onclick = () => {
                document.getElementById("main-img").src = img;
            };

            gallery.appendChild(image);
        });

        // comments
        function addComment() {
            const input = document.getElementById("comment-input");
            if (input.value.trim() === "") return;

            const p = document.createElement("p");
            p.innerText = input.value;
            document.getElementById("comment-list").appendChild(p);
            input.value = "";
        }
    </script>
    
</body>
</html>
